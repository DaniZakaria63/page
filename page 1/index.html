<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="container">
        <div class="main-content">
            <img src="assets/images/drawers.png" alt="drawer icon" class="drawer-icon">
            <div class="card">
                <div class="card-header">
                    <h1 class="title">Hi Samantha</h1>
                    <div class="title-caption">Welcome back to the workplace! We missed you</div>
                    <div class="card-header-search">
                        <div class="search-icon"><i class="fa fa-search"></i></div>
                        <input type="text" class="header-search" placeholder="Search Text or Project">
                    </div>
                </div>
                <div class="card-body">
                    <div class="card-body-title">Projects <div class="card-body-title-caption">(13)</div>
                    </div>
                    <div class="box-menu">
                        <div class="box-icon">GH</div>
                        <caption class="box-caption">Game House</caption>
                    </div>
                </div>
            </div>
        </div>
        <div class="second-content">
            <div class="card">
                <div class="card-header">
                    <h1 class="title">Cyber Punk</h1>
                    <caption class="title-caption">Welcome back to the workplace!</caption>
                    <div class="image-rounded"></div>
                </div>
                <div class="card-body">
                    <div class="card-body-title">Today</caption>
                    </div>
                    <div class="list-menu">
                        <div class="list-item">
                            <span class="list-icon">Check</span>
                            <div class="list-text">Create Layout From HomePage</div>
                            <div class="list-status">Approved</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
